openapi: 3.0.3
info:
  title: Slack Clone API
  version: 1.0.0
  description: A Slack clone backend API with authentication, workspace management,
    and real-time messaging capabilities.
paths:
  /api/auth/change-password/:
    post:
      operationId: change_password_create
      description: Change the current user password.
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    message: Password changed successfully
          description: Password changed successfully
        '400':
          description: Validation error or incorrect old password
        '401':
          description: Authentication required
  /api/auth/login/:
    post:
      operationId: login_create
      description: Authenticate user with email and password to receive JWT tokens.
      summary: User login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    message: Login successful
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expires_in: 86400
                    user:
                      id: 1
                      email: user@example.com
                      username: user
                      user_type: user
                      user_type_display: User
          description: Login successful
        '401':
          description: Invalid credentials or account deactivated
  /api/auth/logout/:
    post:
      operationId: logout_create
      description: Logout the current user.
      summary: User logout
      tags:
      - Authentication
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    message: Logout successful
          description: Logout successful
        '401':
          description: Authentication required
  /api/auth/profile/:
    get:
      operationId: profile_retrieve
      description: Retrieve the profile information of the currently authenticated
        user.
      summary: Get current user profile
      tags:
      - Users
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    user:
                      id: 1
                      email: user@example.com
                      username: user
                      first_name: John
                      last_name: Doe
                      display_name: John Doe
                      user_type: user
                      user_type_display: User
                      full_name: John Doe
                      avatar_url: ''
                      status: Working hard!
                      is_active: true
                      date_joined: '2024-01-01T00:00:00Z'
                      last_active: '2024-01-01T12:00:00Z'
                      email_verified: true
                      timezone: UTC
                      language: en
          description: User profile retrieved successfully
        '401':
          description: Authentication required
    put:
      operationId: profile_update
      description: Update the current user profile information.
      summary: Update user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Profile updated successfully
        '400':
          description: Validation error
        '401':
          description: Authentication required
    patch:
      operationId: profile_partial_update
      description: Partially update the current user profile (PATCH).
      summary: Partially update user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Profile updated successfully
        '400':
          description: Validation error
        '401':
          description: Authentication required
  /api/auth/refresh/:
    post:
      operationId: refresh_create
      description: Get a new access token using a valid refresh token.
      summary: Refresh access token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expires_in: 86400
          description: New access token generated
        '401':
          description: Invalid or expired refresh token
  /api/auth/register/:
    post:
      operationId: register_create
      description: Create a new user account with email, username, and password.
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    message: User registered successfully
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expires_in: 86400
                    user:
                      id: 1
                      email: user@example.com
                      username: newuser
                      user_type: user
                      user_type_display: User
          description: User registered successfully
        '400':
          description: Validation error or email/username already exists
  /api/auth/users/:
    get:
      operationId: users_retrieve
      description: List all users with optional filtering by user type or search query.
      summary: List users
      tags:
      - Users
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    count: 3
                    users:
                    - id: 1
                      username: admin
                      display_name: Admin
                      avatar_url: ''
                      status: Managing the system
                      user_type: admin
                      is_active: true
          description: List of users
        '401':
          description: Authentication required
  /api/auth/users/{user_id}/:
    get:
      operationId: users_retrieve_2
      description: Get detailed information about a specific user.
      summary: Get user details
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: User details retrieved
        '404':
          description: User not found
        '401':
          description: Authentication required
  /api/auth/users/{user_id}/activate/:
    post:
      operationId: users_activate_create
      description: Activate a user account (admin only).
      summary: Activate user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: User activated
        '404':
          description: User not found
        '403':
          description: Admin permission required
    delete:
      operationId: users_activate_destroy
      description: Deactivate a user account (admin only).
      summary: Deactivate user
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: User deactivated
        '404':
          description: User not found
        '403':
          description: Admin permission required
  /api/auth/workspaces/:
    get:
      operationId: workspaces_retrieve
      description: Get a list of all workspaces where the current user is a member.
      summary: List my workspaces
      tags:
      - Workspaces
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    count: 2
                    workspaces:
                    - id: 1
                      name: Engineering Team
                      slug: engineering-team
                      description: Our engineering workspace
                      icon_url: ''
                      is_public: false
                      member_count: 5
                      user_role: owner
                      created_at: '2024-01-01T00:00:00Z'
          description: List of workspaces
        '401':
          description: Authentication required
    post:
      operationId: workspaces_create
      description: Create a new workspace. The creator automatically becomes the owner.
      summary: Create workspace
      tags:
      - Workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceCreateRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    message: Workspace created successfully
                    workspace:
                      id: 1
                      name: Engineering Team
                      slug: engineering-team
                      description: Our engineering workspace
                      owner:
                        id: 1
                        email: user@example.com
                      is_public: false
                      invite_code: AbCdEfGh12345678
          description: Workspace created successfully
        '400':
          description: Validation error
        '401':
          description: Authentication required
  /api/auth/workspaces/{workspace_id}/:
    get:
      operationId: workspaces_retrieve_2
      description: Get detailed information about a specific workspace.
      summary: Get workspace details
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Workspaces
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Workspace details
        '403':
          description: Not a member of this workspace
        '404':
          description: Workspace not found
        '401':
          description: Authentication required
    put:
      operationId: workspaces_update
      description: Update workspace settings (admin only).
      summary: Update workspace
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdateRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Workspace updated
        '403':
          description: Admin permission required
        '400':
          description: Validation error
        '401':
          description: Authentication required
    delete:
      operationId: workspaces_destroy
      description: Delete a workspace (owner only).
      summary: Delete workspace
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Workspaces
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Workspace deleted
        '403':
          description: Owner permission required
        '401':
          description: Authentication required
  /api/auth/workspaces/{workspace_id}/channels/:
    get:
      operationId: workspaces_channels_retrieve
      description: Get all channels visible to the current user in a workspace.
      summary: List workspace channels
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: List of channels
        '403':
          description: Not a workspace member
        '404':
          description: Workspace not found
    post:
      operationId: workspaces_channels_create
      description: Create a new channel in the workspace.
      summary: Create channel
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Channel created
        '400':
          description: Validation error or name exists
        '403':
          description: Not a workspace member
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/:
    get:
      operationId: workspaces_channels_retrieve_2
      description: Get detailed information about a channel.
      summary: Get channel details
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Cannot view this channel
        '404':
          description: Channel not found
    put:
      operationId: workspaces_channels_update
      description: Update channel topic and description.
      summary: Update channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChannelUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChannelUpdateRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Admin permission required
        '400':
          description: Channel is archived
    delete:
      operationId: workspaces_channels_destroy
      description: Delete an empty channel.
      summary: Delete channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Admin permission required
        '400':
          description: Channel has messages or is default
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/archive/:
    post:
      operationId: workspaces_channels_archive_create
      description: Archive a channel (make read-only).
      summary: Archive channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Admin permission required
        '400':
          description: Cannot archive default channel
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/invite/:
    post:
      operationId: workspaces_channels_invite_create
      description: Invite a workspace member to a private channel.
      summary: Invite to channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Must be channel member
        '400':
          description: User already member or not in workspace
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/join/:
    post:
      operationId: workspaces_channels_join_create
      description: Join a public channel.
      summary: Join channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Private channel or not workspace member
        '400':
          description: Already a member or archived
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/leave/:
    post:
      operationId: workspaces_channels_leave_create
      description: 'Leave a channel (cannot leave #general).'
      summary: Leave channel
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          description: Not a member or is default channel
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/mark-read/:
    post:
      operationId: workspaces_channels_mark_read_create
      description: Mark all messages in channel as read.
      summary: Mark as read
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/members/:
    get:
      operationId: workspaces_channels_members_retrieve
      description: Get all members of a channel.
      summary: List channel members
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Channels
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Cannot view this channel
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/messages/:
    get:
      operationId: workspaces_channels_messages_retrieve
      description: Get messages from a channel (paginated).
      summary: List messages
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Messages
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Cannot view channel
    post:
      operationId: workspaces_channels_messages_create
      description: Post a new message to a channel.
      summary: Post message
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageCreateRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Cannot post to channel
        '400':
          description: Channel is archived
  /api/auth/workspaces/{workspace_id}/channels/{channel_id}/messages/{message_id}/:
    put:
      operationId: workspaces_channels_messages_update
      description: Edit your own message.
      summary: Edit message
      parameters:
      - in: path
        name: channel_id
        schema:
          type: integer
        required: true
      - in: path
        name: message_id
        schema:
          type: integer
        required: true
      - in: path
        name: workspace_id
        schema:
          type: integer
        required: true
      tags:
      - Messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageEditRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageEditRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageEditRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          description: Can only edit own messages
    delete:
      operationId: workspaces_channels_messages_destroy
      description: Delete your own message (or admin can delete any).
      summary: Delete message
      parameters:
      - in: path
        name: channel_id
