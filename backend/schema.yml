      operationId: workspaces_search_retrieve
      description: Search workspaces by name or description.
      summary: Search workspaces
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Search query string
      tags:
      - Workspaces
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Search results
        '401':
          description: Authentication required
components:
  schemas:
    AcceptInviteRequest:
      type: object
      description: Serializer for accepting workspace invite.
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    ChannelCreateRequest:
      type: object
      description: Serializer for creating channels.
      properties:
        name:
          type: string
          minLength: 1
          description: 'Channel name (without the #)'
          maxLength: 80
        channel_type:
          allOf:
          - $ref: '#/components/schemas/ChannelTypeEnum'
          description: |-
            Public channels are visible to all workspace members

            * `public` - Public
            * `private` - Private
        topic:
          type: string
          description: Brief topic shown at the top of the channel
          maxLength: 250
        description:
          type: string
          description: Detailed description of the channel purpose
      required:
      - name
    ChannelTypeEnum:
      enum:
      - public
      - private
      type: string
      description: |-
        * `public` - Public
        * `private` - Private
    ChannelUpdateRequest:
      type: object
      description: Serializer for updating channels.
      properties:
        topic:
          type: string
          description: Brief topic shown at the top of the channel
          maxLength: 250
        description:
          type: string
          description: Detailed description of the channel purpose
    DirectMessageConversationCreateRequest:
      type: object
      description: Serializer for creating DM conversations.
      properties:
        participant_ids:
          type: array
          items:
            type: integer
          description: List of user IDs to include in the conversation
          maxItems: 8
          minItems: 1
        name:
          type: string
          description: Optional name for group DMs
          maxLength: 100
      required:
      - participant_ids
    DirectMessageCreateRequest:
      type: object
      description: Serializer for creating direct messages.
      properties:
        content:
          type: string
          minLength: 1
          description: Message content (max 4000 characters)
          maxLength: 4000
        parent_message_id:
          type: integer
          nullable: true
          description: ID of parent message for thread replies
      required:
      - content
    DirectMessageEditRequest:
      type: object
      description: Serializer for editing direct messages.
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
      required:
      - content
    JoinByInviteCodeRequest:
      type: object
      description: Serializer for joining workspace by invite code.
      properties:
        invite_code:
          type: string
          minLength: 1
          maxLength: 32
      required:
      - invite_code
    MessageCreateRequest:
      type: object
      description: Serializer for creating messages.
      properties:
        content:
          type: string
          minLength: 1
          description: Message content (max 4000 characters)
          maxLength: 4000
        parent_message_id:
          type: integer
          nullable: true
          description: ID of parent message for thread replies
      required:
      - content
    MessageEditRequest:
      type: object
      description: Serializer for editing messages.
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
      required:
      - content
    PasswordChangeRequest:
      type: object
      description: Serializer for password change.
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 8
        new_password_confirm:
          type: string
          minLength: 1
      required:
      - new_password
      - new_password_confirm
      - old_password
    PatchedUserProfileRequest:
      type: object
      description: Serializer for user profile updates.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        display_name:
          type: string
          description: Display name shown in the application
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: URL to user avatar image
          maxLength: 200
        status:
          type: string
          description: User status message
          maxLength: 100
        timezone:
          type: string
          minLength: 1
          description: User preferred timezone
          maxLength: 50
        language:
          type: string
          minLength: 1
          description: User preferred language
          maxLength: 10
        email_notifications:
          type: boolean
        push_notifications:
          type: boolean
    ReactionCreateRequest:
      type: object
      description: Serializer for adding reactions.
      properties:
        emoji:
          type: string
          minLength: 1
          description: Emoji unicode or shortcode
          maxLength: 50
        emoji_name:
          type: string
          description: Name for custom emojis
          maxLength: 50
      required:
      - emoji
    RoleEnum:
      enum:
      - admin
      - member
      type: string
      description: |-
        * `admin` - admin
        * `member` - member
    TransferOwnershipRequest:
      type: object
      description: Serializer for transferring workspace ownership.
      properties:
        new_owner_id:
          type: integer
      required:
      - new_owner_id
    UserLoginRequest:
      type: object
      description: Serializer for user login.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - email
      - password
    UserProfileRequest:
      type: object
      description: Serializer for user profile updates.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        display_name:
          type: string
          description: Display name shown in the application
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: URL to user avatar image
          maxLength: 200
        status:
          type: string
          description: User status message
          maxLength: 100
        timezone:
          type: string
          minLength: 1
          description: User preferred timezone
          maxLength: 50
        language:
          type: string
          minLength: 1
          description: User preferred language
          maxLength: 10
        email_notifications:
          type: boolean
        push_notifications:
          type: boolean
    UserRegistrationRequest:
      type: object
      description: Serializer for user registration.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Email address
          description: Unique email address used for login
          maxLength: 254
        username:
          type: string
          minLength: 1
          description: Unique username for display
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        display_name:
          type: string
          description: Display name shown in the application
          maxLength: 100
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          default: user
      required:
      - email
      - password
      - password_confirm
      - username
    UserTypeEnum:
      enum:
      - admin
      - super_user
      - user
      type: string
      description: |-
        * `admin` - Admin
        * `super_user` - Super User
        * `user` - User
    WorkspaceCreateRequest:
      type: object
      description: Serializer for creating workspaces.
      properties:
        name:
          type: string
          minLength: 1
          description: Name of the workspace
          maxLength: 100
        description:
          type: string
          description: Description of the workspace
        is_public:
          type: boolean
          description: Whether the workspace is publicly discoverable
      required:
      - name
    WorkspaceInviteCreateRequest:
      type: object
      description: Serializer for creating workspace invites.
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    WorkspaceMemberUpdateRequest:
      type: object
      description: Serializer for updating member role.
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - role
    WorkspaceUpdateRequest:
      type: object
      description: Serializer for updating workspaces.
      properties:
        name:
          type: string
          minLength: 1
          description: Name of the workspace
          maxLength: 100
        description:
          type: string
          description: Description of the workspace
        is_public:
          type: boolean
          description: Whether the workspace is publicly discoverable
        allow_guests:
          type: boolean
          description: Whether guests can be invited to this workspace
        icon_url:
          type: string
          format: uri
          nullable: true
          description: Workspace icon URL
          maxLength: 200
      required:
      - name
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Enter JWT token in format: Bearer <your_token>'
tags:
- name: Authentication
  description: User registration, login, logout, and password management
- name: Users
  description: User profile management and user listing
- name: Workspaces
  description: Workspace CRUD operations and management
- name: Workspace Members
  description: Member management within workspaces
- name: Workspace Invites
  description: Invitation system for joining workspaces
